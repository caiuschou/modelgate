name: CD (SSH Deploy)

on:
  push:
    branches: ["main"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/modelgate" "dist/modelgate"
          cp "config.example.toml" "dist/config.toml"
          tar -C dist -czf "modelgate-${GITHUB_SHA}.tar.gz" .

      - name: Upload package to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "modelgate-${{ github.sha }}.tar.gz"
          target: "/tmp"

      - name: Deploy on server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_NAME="modelgate"
            SERVICE_NAME="${{ secrets.SERVICE_NAME }}"
            DEPLOY_ROOT="${{ secrets.DEPLOY_ROOT }}"
            SHA="${{ github.sha }}"
            RELEASE_DIR="${DEPLOY_ROOT}/releases/${SHA}"

            sudo mkdir -p "${DEPLOY_ROOT}/releases" "${DEPLOY_ROOT}/shared"
            sudo mkdir -p "${RELEASE_DIR}"
            sudo tar -C "${RELEASE_DIR}" -xzf "/tmp/${APP_NAME}-${SHA}.tar.gz"

            # Ensure executable bit
            sudo chmod +x "${RELEASE_DIR}/modelgate"

            # Point "current" to this release
            sudo ln -sfn "${RELEASE_DIR}" "${DEPLOY_ROOT}/current"

            # (Optional) keep a stable config path for systemd
            sudo ln -sfn "${DEPLOY_ROOT}/current/config.toml" "${DEPLOY_ROOT}/shared/config.toml"

            # Restart service
            sudo systemctl daemon-reload || true
            sudo systemctl restart "${SERVICE_NAME}"
            sudo systemctl --no-pager --full status "${SERVICE_NAME}" || true

            # Basic health check (adjust port if needed)
            curl -fsS "http://127.0.0.1:8000/healthz" >/dev/null

