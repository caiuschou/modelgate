name: CD (SSH Deploy)

on:
  push:
    branches: ["main"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/modelgate" "dist/modelgate"
          cp "config.example.toml" "dist/config.example.toml"
          tar -C dist -czf "modelgate-${GITHUB_SHA}.tar.gz" .

      - name: Upload package to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "modelgate-${{ github.sha }}.tar.gz"
          target: "/tmp"

      - name: Deploy on server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_NAME="modelgate"
            SERVICE_NAME="${{ secrets.SERVICE_NAME }}"
            DEPLOY_ROOT="${{ secrets.DEPLOY_ROOT }}"
            SHA="${{ github.sha }}"
            RELEASE_DIR="${DEPLOY_ROOT}/releases/${SHA}"

            mkdir -p "${DEPLOY_ROOT}/releases" "${DEPLOY_ROOT}/shared"
            mkdir -p "${DEPLOY_ROOT}/shared/logs"
            mkdir -p "${RELEASE_DIR}"
            tar -C "${RELEASE_DIR}" -xzf "/tmp/${APP_NAME}-${SHA}.tar.gz"
            # Free /tmp (often a small tmpfs); leftover tarballs caused "No space left on device" on extract
            rm -f "/tmp/${APP_NAME}-${SHA}.tar.gz"

            # Ensure executable bit
            chmod +x "${RELEASE_DIR}/modelgate"

            # Initialize shared config once; keep it across releases
            if [ ! -f "${DEPLOY_ROOT}/shared/config.toml" ]; then
              cp "${RELEASE_DIR}/config.example.toml" "${DEPLOY_ROOT}/shared/config.toml"
            fi
            CONFIG="${DEPLOY_ROOT}/shared/config.toml"
            if [ -f "${CONFIG}" ]; then
              sed -i 's/\r$//' "${CONFIG}" || true
            fi
            # Rolling tracing logs (WorkingDirectory is release dir → ../shared/logs resolves under DEPLOY_ROOT)
            if [ -f "${CONFIG}" ]; then
              if ! grep -q '^\[logging\]' "${CONFIG}"; then
                printf '\n[logging]\ntracing_log_dir = "../shared/logs"\n' >> "${CONFIG}"
              elif grep -q 'tracing_log_dir = ""' "${CONFIG}"; then
                sed -i 's|tracing_log_dir = ""|tracing_log_dir = "../shared/logs"|' "${CONFIG}"
              fi
            fi
            # SQLite: default modelgate.db is per-release cwd; pin DB under shared/ so data survives deploys
            if [ -f "${CONFIG}" ] && ! grep -q '^\[sqlite\]' "${CONFIG}"; then
              printf '\n[sqlite]\npath = "../shared/modelgate.db"\n' >> "${CONFIG}"
            fi
            chown -R modelgate:modelgate "${DEPLOY_ROOT}/shared/logs" 2>/dev/null || true

            ln -sfn "${DEPLOY_ROOT}/shared/config.toml" "${RELEASE_DIR}/config.toml"

            # Migrate DB from previous current release before switching symlink (first time shared DB is empty)
            SHARED_DB="${DEPLOY_ROOT}/shared/modelgate.db"
            PREV_CURRENT=$(readlink -f "${DEPLOY_ROOT}/current" 2>/dev/null || true)
            if [ ! -f "${SHARED_DB}" ] && [ -n "${PREV_CURRENT}" ] && [ -f "${PREV_CURRENT}/modelgate.db" ]; then
              cp -a "${PREV_CURRENT}/modelgate.db" "${SHARED_DB}"
              chown modelgate:modelgate "${SHARED_DB}" 2>/dev/null || true
            fi

            # Point "current" to this release
            ln -sfn "${RELEASE_DIR}" "${DEPLOY_ROOT}/current"

            # Restart service
            systemctl daemon-reload || true
            systemctl restart "${SERVICE_NAME}"
            sleep 2
            journalctl -u "${SERVICE_NAME}" -n 20 --no-pager || true
            systemctl --no-pager --full status "${SERVICE_NAME}" || true

            # Basic health check (adjust port if needed)
            curl -fsS "http://127.0.0.1:8000/healthz" >/dev/null

