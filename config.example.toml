[server]
host = "0.0.0.0"
port = 8000

[auth]
# Required for POST /api/v1/auth/register. Set to "" to disable self-service registration.
# Override at runtime: AUTH_INVITE_CODE
invite_code = "ZW9Z"

[upstream]
# OpenAI: https://api.openai.com/v1  |  OpenRouter: https://openrouter.ai/api/v1
# Override with env UPSTREAM_BASE_URL on the server.
base_url = "https://api.openai.com/v1"
# Prefer UPSTREAM_API_KEY in production (OpenAI key or OpenRouter key, matching base_url).
api_key = "sk-your-openai-key-here"

# Optional: rolling tracing logs (`modelgate.log.YYYY-MM-DD`). Empty = stderr only (e.g. systemd journal).
# On SSH deploy, CD sets `../shared/logs` (relative to release = persistent logs under shared/).
# Override with env TRACING_LOG_DIR if needed.
[logging]
tracing_log_dir = ""

# SQLite defaults to `modelgate.db` in the process cwd (OK for local dev).
# SSH deploy adds `[sqlite] path = "../shared/modelgate.db"` so the DB survives release switches.

